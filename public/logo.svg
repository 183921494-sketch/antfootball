<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="#B08D57" stroke="#111111" stroke-width="3"/>
  
  <!-- 蚂蚁身体 -->
  <ellipse cx="100" cy="80" rx="25" ry="35" fill="#111111"/>
  
  <!-- 蚂蚁头部 -->
  <circle cx="100" cy="45" r="22" fill="#111111"/>
  
  <!-- 蚂蚁眼睛 -->
  <circle cx="92" cy="40" r="4" fill="#F7F5F0"/>
  <circle cx="108" cy="40" r="4" fill="#F7F5F0"/>
  
  <!-- 蚂蚁触角 -->
  <path d="M 85 30 Q 75 15 65 20" stroke="#111111" stroke-width="3" fill="none"/>
  <path d="M 115 30 Q 125 15 135 20" stroke="#111111" stroke-width="3" fill="none"/>
  
  <!-- 蚂蚁腿部（左侧） -->
  <path d="M 80 90 L 50 110" stroke="#111111" stroke-width="4" fill="none"/>
  <path d="M 75 100 L 45 130" stroke="#111111" stroke-width="4" fill="none"/>
  <path d="M 80 110 L 55 140" stroke="#111111" stroke-width="4" fill="none"/>
  
  <!-- 蚂蚁腿部（右侧） -->
  <path d="M 120 90 L 150 110" stroke="#111111" stroke-width="4" fill="none"/>
  <path d="M 125 100 L 155 130" stroke="#111111" stroke-width="4" fill="none"/>
  <path d="M 120 110 L 145 140" stroke="#111111" stroke-width="4" fill="none"/>
  
  <!-- 蚂蚁腹部 -->
  <ellipse cx="100" cy="130" rx="30" ry="25" fill="#111111"/>
  
  <!-- 足球纹理 -->
  <polygon points="100,150 85,145 85,160 100,165 115,160 115,145" fill="#F7F5F0"/>
  
  <!-- 文字：蚂蚁足球 -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#111111">蚂蚁足球</text>
</svg>
